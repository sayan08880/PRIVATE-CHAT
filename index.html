<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>PRIVATE CHAT</title>
<link rel="icon" type="image/png" href="lock.png">

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  min-height:100vh;
  min-height:100dvh;
  color:white;
  background:
    radial-gradient(circle at top left,#00d4ff55,transparent 35%),
    radial-gradient(circle at bottom right,#8a2be255,transparent 35%),
    linear-gradient(135deg,#050433,#09093f,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  padding:10px;
}

body::before{
  content:"";
  position:fixed;
  inset:-50%;
  background-image:radial-gradient(#ffffff55 1px,transparent 1px);
  background-size:45px 45px;
  animation:moveBg 20s linear infinite;
  opacity:.18;
  z-index:-1;
}

@keyframes moveBg{
  from{transform:translate(0,0)}
  to{transform:translate(-120px,-120px)}
}

.box{
  width:min(96vw,950px);
  height:min(92vh,920px);
  height:min(92dvh,920px);
  background:rgba(10,10,60,.84);
  border:1px solid rgba(0,212,255,.35);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  padding:22px;
  border-radius:22px;
  box-shadow:0 0 35px rgba(0,212,255,.25);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.header{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-bottom:15px;
  flex-shrink:0;
}

h2{
  margin:0;
  color:#00d4ff;
  letter-spacing:1px;
  text-align:center;
  font-size:26px;
}

.top{
  display:grid;
  grid-template-columns:1fr 1fr auto;
  gap:10px;
  flex-shrink:0;
}

input,button{
  padding:13px;
  border:none;
  border-radius:12px;
  font-size:15px;
  outline:none;
  min-width:0;
}

input{
  background:rgba(255,255,255,.1);
  color:white;
  border:1px solid rgba(255,255,255,.15);
}

input::placeholder{color:#cfcfff}

button{
  background:linear-gradient(135deg,#00d4ff,#00ff88);
  color:#000;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
  white-space:nowrap;
}

button:hover{
  transform:scale(1.03);
  box-shadow:0 0 18px #00d4ff88;
}

button:active{transform:scale(.98)}

.danger{
  background:linear-gradient(135deg,#ff4d4d,#ff9900);
}

.controls{
  display:none;
  grid-template-columns:auto auto auto;
  gap:10px;
  margin-top:10px;
  flex-shrink:0;
}

.info{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin:12px 0;
  font-size:14px;
  color:#00ffcc;
  flex-wrap:wrap;
  flex-shrink:0;
}

#roomStatus,#onlineStatus,#lockStatus,#autoDeleteStatus{
  background:rgba(255,255,255,.08);
  padding:7px 11px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.1);
}

#chat{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  background:rgba(0,0,0,.32);
  padding:15px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.1);
  scroll-behavior:smooth;
  min-height:0;
}

#chat::-webkit-scrollbar,
.emoji-bar::-webkit-scrollbar{height:5px;width:5px}
#chat::-webkit-scrollbar-thumb,
.emoji-bar::-webkit-scrollbar-thumb{background:#00d4ff88;border-radius:20px}

.empty{
  text-align:center;
  color:#aaa;
  margin-top:25px;
  font-size:14px;
}

.msg{
  max-width:75%;
  padding:10px 13px;
  margin:8px 0;
  border-radius:14px;
  word-wrap:break-word;
  overflow-wrap:anywhere;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.12);
}

.myMsg{
  margin-left:auto;
  background:linear-gradient(135deg,#00d4ff,#0077ff);
  color:#000;
}

.name{
  font-size:12px;
  font-weight:bold;
  display:block;
  margin-bottom:4px;
  color:#00ffcc;
}

.myMsg .name{color:#001b2b}

.time{
  display:block;
  font-size:10px;
  opacity:.75;
  margin-top:5px;
  text-align:right;
}

#typingStatus{
  min-height:20px;
  margin:8px 0 4px;
  font-size:13px;
  color:#ffd166;
  flex-shrink:0;
}

.emoji-bar{
  display:flex;
  gap:8px;
  margin:8px 0;
  flex-wrap:nowrap;
  overflow-x:auto;
  overflow-y:hidden;
  padding-bottom:5px;
  flex-shrink:0;
}

.emoji-bar button{
  width:auto;
  min-width:44px;
  padding:8px 11px;
  font-size:18px;
  background:rgba(255,255,255,.12);
  color:white;
  flex:0 0 auto;
}

.bottom{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  flex-shrink:0;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  justify-content:center;
  align-items:center;
  z-index:10;
  padding:15px;
}

.modalBox{
  width:92%;
  max-width:420px;
  background:#10105a;
  border:1px solid rgba(0,212,255,.35);
  padding:22px;
  border-radius:18px;
  box-shadow:0 0 30px rgba(0,212,255,.25);
}

.modalBox h3{
  margin-top:0;
  color:#00d4ff;
  text-align:center;
}

.modalBtns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

@media(max-width:700px){
  body{
    padding:6px;
    align-items:stretch;
  }

  .box{
    width:100%;
    height:calc(100dvh - 12px);
    padding:12px;
    border-radius:16px;
  }

  h2{font-size:21px}

  .top,.bottom,.controls{
    grid-template-columns:1fr;
  }

  input,button{
    width:100%;
    font-size:16px;
    padding:12px;
  }

  .controls button{
    font-size:13px;
  }

  .info{
    font-size:12px;
    gap:7px;
    margin:9px 0;
  }

  #roomStatus,#onlineStatus,#lockStatus,#autoDeleteStatus{
    padding:6px 9px;
  }

  #chat{
    padding:10px;
    border-radius:12px;
  }

  .msg{
    max-width:92%;
    font-size:14px;
  }

  .emoji-bar button{
    min-width:40px;
    font-size:17px;
    padding:7px 9px;
  }

  .modalBox{
    padding:18px;
  }
}

@media(max-width:380px){
  .box{padding:9px}
  h2{font-size:19px}
  input,button{font-size:15px;padding:10px}
  .msg{max-width:96%}
}
</style>
</head>

<body>

<div class="box">
  <div class="header">
    <h2>PRIVATE CHAT</h2>
  </div>

  <div class="top">
    <input id="name" placeholder="Enter your name" maxlength="20" autocomplete="name">
    <input id="token" placeholder="Enter secret room token" maxlength="40" autocomplete="off">
    <button onclick="joinChat()">Join Room</button>
  </div>

  <div class="controls" id="controls">
    <button onclick="lockConversation()">🔒 Lock Conversation</button>
    <button onclick="openConversation()">🔓 Open Conversation</button>
    <button class="danger" onclick="deleteAllConversation()">🗑 Reset Now</button>
  </div>

  <div class="info">
    <div id="roomStatus">Not joined</div>
    <div id="lockStatus">Room: Unknown</div>
    <div id="onlineStatus">Online: 0</div>
    <div id="autoDeleteStatus">Auto-delete: 24h</div>
  </div>

  <div id="chat">
    <div class="empty">Join a private room to start chat.</div>
  </div>

  <div id="typingStatus"></div>

  <div class="emoji-bar">
    <button onclick="addEmoji('😀')">😀</button>
    <button onclick="addEmoji('😁')">😁</button>
    <button onclick="addEmoji('😂')">😂</button>
    <button onclick="addEmoji('🤣')">🤣</button>
    <button onclick="addEmoji('😊')">😊</button>
    <button onclick="addEmoji('😍')">😍</button>
    <button onclick="addEmoji('😘')">😘</button>
    <button onclick="addEmoji('😎')">😎</button>
    <button onclick="addEmoji('🤔')">🤔</button>
    <button onclick="addEmoji('😴')">😴</button>
    <button onclick="addEmoji('😭')">😭</button>
    <button onclick="addEmoji('😡')">😡</button>
    <button onclick="addEmoji('🥳')">🥳</button>
    <button onclick="addEmoji('🤩')">🤩</button>
    <button onclick="addEmoji('😇')">😇</button>
    <button onclick="addEmoji('🤗')">🤗</button>
    <button onclick="addEmoji('👍')">👍</button>
    <button onclick="addEmoji('❤️')">❤️</button>
    <button onclick="addEmoji('🔥')">🔥</button>
    <button onclick="addEmoji('🙏')">🙏</button>
  </div>

  <div class="bottom">
    <input id="message" placeholder="Type encrypted message..." maxlength="500" autocomplete="off">
    <button onclick="sendMessage()">➤ Send</button>
  </div>
</div>

<div class="modal" id="roomChoiceModal">
  <div class="modalBox">
    <h3>Conversation Mode</h3>
    <p>This token room is new. Choose mode:</p>
    <div class="modalBtns">
      <button onclick="createLockedRoom()">🔒 Lock</button>
      <button onclick="createOpenRoom()">🔓 Open</button>
    </div>
  </div>
</div>

<div class="modal" id="passwordModal">
  <div class="modalBox">
    <h3 id="passwordTitle">Room Password</h3>
    <input type="password" id="roomPassword" placeholder="Enter room password" autocomplete="off">
    <div class="modalBtns">
      <button onclick="submitPassword()">OK</button>
      <button class="danger" onclick="closePasswordModal()">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
  getDatabase,
  ref,
  push,
  onValue,
  onDisconnect,
  set,
  remove,
  get,
  update,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5NxG9giJAGwRRCFqeBxRu8MUwE3E0C0o",
  authDomain: "tokenchat-f3da8.firebaseapp.com",
  databaseURL: "https://tokenchat-f3da8-default-rtdb.firebaseio.com",
  projectId: "tokenchat-f3da8",
  storageBucket: "tokenchat-f3da8.appspot.com",
  messagingSenderId: "501565300058",
  appId: "1:501565300058:web:816dd41819e2b03b692763"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const AUTO_DELETE_MS = 24 * 60 * 60 * 1000;

let currentToken = "";
let cryptoKey = null;
let myName = "";
let userId = "";
let typingTimer = null;
let roomResetTimer = null;
let countdownTimer = null;
let pendingPasswordAction = "";
let pendingRoomPassword = "";

const encoder = new TextEncoder();
const decoder = new TextDecoder();

async function sha256(text){
  const hash = await crypto.subtle.digest("SHA-256", encoder.encode(text));
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function getKeyFromSecret(secret){
  const hash = await crypto.subtle.digest("SHA-256", encoder.encode(secret));
  return crypto.subtle.importKey(
    "raw",
    hash,
    {name:"AES-GCM"},
    false,
    ["encrypt","decrypt"]
  );
}

function bufferToBase64(buffer){
  return btoa(String.fromCharCode(...new Uint8Array(buffer)));
}

function base64ToBuffer(base64){
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  return bytes.buffer;
}

async function encryptText(text){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const encrypted = await crypto.subtle.encrypt(
    {name:"AES-GCM",iv},
    cryptoKey,
    encoder.encode(text)
  );
  return {iv:bufferToBase64(iv),text:bufferToBase64(encrypted)};
}

async function decryptText(encryptedText,ivText){
  try{
    const decrypted = await crypto.subtle.decrypt(
      {name:"AES-GCM",iv:new Uint8Array(base64ToBuffer(ivText))},
      cryptoKey,
      base64ToBuffer(encryptedText)
    );
    return decoder.decode(decrypted);
  }catch{
    return "[Wrong password / Cannot decrypt]";
  }
}

function cleanToken(token){
  return token.replace(/\s+/g,"").replace(/[.#$/[\]]/g,"_");
}

function createUserId(){
  return Date.now()+"_"+Math.random().toString(36).slice(2);
}

function getTimeText(timestamp){
  if(!timestamp) return "";
  return new Date(timestamp).toLocaleTimeString([],{
    hour:"2-digit",
    minute:"2-digit"
  });
}

function formatRemaining(ms){
  if(ms <= 0) return "resetting soon";
  const hours = Math.floor(ms / (60 * 60 * 1000));
  const minutes = Math.floor((ms % (60 * 60 * 1000)) / (60 * 1000));
  if(hours > 0) return `${hours}h ${minutes}m left`;
  return `${minutes}m left`;
}

function updateAutoDeleteText(expiresAt){
  const el = document.getElementById("autoDeleteStatus");
  if(!el) return;
  if(!expiresAt){
    el.textContent = "Auto-delete: 24h";
    return;
  }
  const left = expiresAt - Date.now();
  el.textContent = "Auto-delete: " + formatRemaining(left);
}

async function ensureRoomExpiry(){
  const settingsRef = ref(db,"rooms/"+currentToken+"/settings");
  const snap = await get(settingsRef);
  if(!snap.exists()) return;

  const settings = snap.val();
  const now = Date.now();

  if(!settings.expiresAt){
    await update(settingsRef,{expiresAt:now + AUTO_DELETE_MS});
    updateAutoDeleteText(now + AUTO_DELETE_MS);
    return;
  }

  if(now >= settings.expiresAt){
    await resetExpiredRoom(false);
  }else{
    updateAutoDeleteText(settings.expiresAt);
  }
}

async function resetExpiredRoom(showAlert=true){
  if(!currentToken) return;

  const now = Date.now();
  await remove(ref(db,"rooms/"+currentToken+"/messages"));
  await remove(ref(db,"rooms/"+currentToken+"/typing"));

  await update(ref(db,"rooms/"+currentToken+"/settings"),{
    lastResetAt:now,
    expiresAt:now + AUTO_DELETE_MS
  });

  updateAutoDeleteText(now + AUTO_DELETE_MS);

  if(showAlert){
    alert("Room database reset. All messages deleted and new 24-hour timer started.");
  }
}

function startAutoResetWatcher(){
  clearInterval(roomResetTimer);
  clearInterval(countdownTimer);

  roomResetTimer = setInterval(async()=>{
    if(currentToken){
      await ensureRoomExpiry();
    }
  },60000);

  countdownTimer = setInterval(async()=>{
    if(!currentToken) return;
    const snap = await get(ref(db,"rooms/"+currentToken+"/settings/expiresAt"));
    updateAutoDeleteText(snap.val());
  },30000);
}

window.joinChat = async function(){
  const nameInput = document.getElementById("name").value.trim();
  const tokenInput = document.getElementById("token").value.trim();

  if(nameInput===""){
    alert("Enter your name");
    return;
  }

  if(tokenInput===""){
    alert("Enter secret token");
    return;
  }

  myName = nameInput;
  currentToken = cleanToken(tokenInput);
  userId = createUserId();

  const settingsSnap = await get(ref(db,"rooms/"+currentToken+"/settings"));

  if(!settingsSnap.exists()){
    document.getElementById("roomChoiceModal").style.display="flex";
    return;
  }

  const settings = settingsSnap.val();

  if(settings.locked){
    pendingPasswordAction = "join";
    document.getElementById("passwordTitle").textContent = "Enter Room Password";
    document.getElementById("roomPassword").value = "";
    document.getElementById("passwordModal").style.display = "flex";
  }else{
    await enterRoom("");
  }
};

window.createOpenRoom = async function(){
  const now = Date.now();

  await set(ref(db,"rooms/"+currentToken+"/settings"),{
    locked:false,
    passwordHash:"",
    createdAt:serverTimestamp(),
    expiresAt:now + AUTO_DELETE_MS,
    lastResetAt:now
  });

  document.getElementById("roomChoiceModal").style.display="none";
  await enterRoom("");
};

window.createLockedRoom = function(){
  document.getElementById("roomChoiceModal").style.display="none";
  pendingPasswordAction = "createLock";
  document.getElementById("passwordTitle").textContent = "Create Room Password";
  document.getElementById("roomPassword").value = "";
  document.getElementById("passwordModal").style.display = "flex";
};

window.submitPassword = async function(){
  const password = document.getElementById("roomPassword").value.trim();

  if(password.length < 4){
    alert("Password must be at least 4 characters");
    return;
  }

  const hash = await sha256(password);

  if(pendingPasswordAction === "createLock"){
    const now = Date.now();

    await set(ref(db,"rooms/"+currentToken+"/settings"),{
      locked:true,
      passwordHash:hash,
      createdAt:serverTimestamp(),
      expiresAt:now + AUTO_DELETE_MS,
      lastResetAt:now
    });

    closePasswordModal();
    await enterRoom(password);
  }

  if(pendingPasswordAction === "join"){
    const settingsSnap = await get(ref(db,"rooms/"+currentToken+"/settings"));
    const settings = settingsSnap.val();

    if(settings.passwordHash !== hash){
      alert("Wrong password");
      return;
    }

    closePasswordModal();
    await enterRoom(password);
  }

  if(pendingPasswordAction === "lockExisting"){
    await update(ref(db,"rooms/"+currentToken+"/settings"),{
      locked:true,
      passwordHash:hash
    });

    closePasswordModal();
    alert("Conversation locked");
    await enterRoom(password);
  }
};

window.closePasswordModal = function(){
  document.getElementById("passwordModal").style.display="none";
  pendingPasswordAction = "";
};

async function enterRoom(password){
  pendingRoomPassword = password;

  const secret = password ? currentToken + "::" + password : currentToken;
  cryptoKey = await getKeyFromSecret(secret);

  document.getElementById("roomStatus").textContent = "Room: " + currentToken;
  document.getElementById("controls").style.display = "grid";
  document.getElementById("chat").innerHTML = "";

  await ensureRoomExpiry();

  const settingsSnap = await get(ref(db,"rooms/"+currentToken+"/settings"));
  const settings = settingsSnap.val();

  document.getElementById("lockStatus").textContent =
    settings.locked ? "Status: Locked" : "Status: Open";

  setupOnlineStatus();
  setupTypingStatus();
  listenMessages();
  startAutoResetWatcher();
}

window.lockConversation = function(){
  if(!currentToken){
    alert("Join room first");
    return;
  }

  pendingPasswordAction = "lockExisting";
  document.getElementById("passwordTitle").textContent = "Set Lock Password";
  document.getElementById("roomPassword").value = "";
  document.getElementById("passwordModal").style.display = "flex";
};

window.openConversation = async function(){
  if(!currentToken){
    alert("Join room first");
    return;
  }

  if(!confirm("Open this conversation? After opening, users with token can join without password.")){
    return;
  }

  await update(ref(db,"rooms/"+currentToken+"/settings"),{
    locked:false,
    passwordHash:""
  });

  cryptoKey = await getKeyFromSecret(currentToken);
  document.getElementById("lockStatus").textContent = "Status: Open";
  alert("Conversation opened");
};

window.deleteAllConversation = async function(){
  if(!currentToken){
    alert("Join room first");
    return;
  }

  if(!confirm("Reset this room now? All messages will be deleted and the 24-hour timer will restart.")){
    return;
  }

  await resetExpiredRoom(true);
};

function setupOnlineStatus(){
  const userRef = ref(db,"rooms/"+currentToken+"/online/"+userId);

  set(userRef,{
    name:myName,
    joinedAt:serverTimestamp()
  });

  onDisconnect(userRef).remove();

  const onlineRef = ref(db,"rooms/"+currentToken+"/online");

  onValue(onlineRef,(snapshot)=>{
    const users = snapshot.val() || {};
    const count = Object.keys(users).length;
    document.getElementById("onlineStatus").textContent = "Online: " + count;
  });
}

function setupTypingStatus(){
  const typingRef = ref(db,"rooms/"+currentToken+"/typing");

  onValue(typingRef,(snapshot)=>{
    const typingUsers = snapshot.val() || {};
    const names = [];

    Object.keys(typingUsers).forEach((id)=>{
      if(id !== userId && typingUsers[id].typing){
        names.push(typingUsers[id].name);
      }
    });

    document.getElementById("typingStatus").textContent =
      names.length > 0 ? names.join(", ") + " is typing..." : "";
  });
}

function listenMessages(){
  const chatRef = ref(db,"rooms/"+currentToken+"/messages");

  onValue(chatRef,async(snapshot)=>{
    const chatBox = document.getElementById("chat");
    chatBox.innerHTML = "";

    const messages = snapshot.val() || {};
    const list = Object.values(messages);

    if(list.length === 0){
      chatBox.innerHTML = '<div class="empty">No messages yet. Start the chat.</div>';
      return;
    }

    list.sort((a,b)=>(a.time || 0) - (b.time || 0));

    for(const item of list){
      const decryptedMessage = await decryptText(item.text,item.iv);

      const div = document.createElement("div");
      div.className = "msg";

      if(item.senderId === userId){
        div.classList.add("myMsg");
      }

      const nameSpan = document.createElement("span");
      nameSpan.className = "name";
      nameSpan.textContent = item.name;

      const textSpan = document.createElement("span");
      textSpan.textContent = decryptedMessage;

      const timeSpan = document.createElement("span");
      timeSpan.className = "time";
      timeSpan.textContent = getTimeText(item.time);

      div.appendChild(nameSpan);
      div.appendChild(textSpan);
      div.appendChild(timeSpan);
      chatBox.appendChild(div);
    }

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

window.sendMessage = async function(){
  const input = document.getElementById("message");
  const text = input.value.trim();

  if(currentToken==="" || cryptoKey===null){
    alert("Join room first");
    return;
  }

  if(text===""){
    alert("Type a message");
    return;
  }

  try{
    await ensureRoomExpiry();

    const encrypted = await encryptText(text);

    await push(ref(db,"rooms/"+currentToken+"/messages"),{
      senderId:userId,
      name:myName,
      text:encrypted.text,
      iv:encrypted.iv,
      encrypted:true,
      time:Date.now()
    });

    input.value="";
    stopTyping();
  }catch(error){
    console.error("Message send failed:", error);
    alert("Message cannot be sent. Check Firebase Realtime Database rules and internet connection.");
  }
};

window.addEmoji = function(emoji){
  const input = document.getElementById("message");
  input.value += emoji;
  input.focus();
  sendTyping();
};

function sendTyping(){
  if(!currentToken || !userId) return;

  const typingUserRef = ref(db,"rooms/"+currentToken+"/typing/"+userId);

  set(typingUserRef,{
    name:myName,
    typing:true
  });

  clearTimeout(typingTimer);

  typingTimer = setTimeout(()=>{
    stopTyping();
  },1200);
}

function stopTyping(){
  if(!currentToken || !userId) return;
  remove(ref(db,"rooms/"+currentToken+"/typing/"+userId));
}

async function leaveRoom(){
  if(!currentToken || !userId) return;

  await remove(ref(db,"rooms/"+currentToken+"/online/"+userId));
  await remove(ref(db,"rooms/"+currentToken+"/typing/"+userId));
}

document.getElementById("message").addEventListener("input",sendTyping);

document.getElementById("message").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById("roomPassword").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    e.preventDefault();
    submitPassword();
  }
});

window.addEventListener("beforeunload",function(){
  if(!currentToken || !userId) return;

  remove(ref(db,"rooms/"+currentToken+"/online/"+userId));
  remove(ref(db,"rooms/"+currentToken+"/typing/"+userId));
});
</script>

</body>
